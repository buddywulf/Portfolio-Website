    <!-- Submenu Toggle Script -->
    <script>
        const projectsBtn = document.getElementById('projects-btn');
        const projectsSubmenu = document.getElementById('projects-submenu');
        const contactBtn = document.getElementById('contact-btn');
        const contactSubmenu = document.getElementById('contact-submenu');

        // Restore saved dropdown states on page load
        function restoreDropdownStates() {
            if (projectsSubmenu && localStorage.getItem('projectsOpen') === 'true') {
                projectsSubmenu.classList.add('no-transition', 'open');
                setTimeout(() => projectsSubmenu.classList.remove('no-transition'), 0);
            }
            if (contactSubmenu && localStorage.getItem('contactOpen') === 'true') {
                contactSubmenu.classList.add('no-transition', 'open');
                setTimeout(() => contactSubmenu.classList.remove('no-transition'), 0);
            }
        }

        // Save and toggle dropdown states
        if (projectsBtn && projectsSubmenu) {
            projectsBtn.addEventListener('click', function(e) {
                e.preventDefault();
                projectsSubmenu.classList.toggle('open');
                localStorage.setItem('projectsOpen', projectsSubmenu.classList.contains('open'));
            });
        }

        if (contactBtn && contactSubmenu) {
            contactBtn.addEventListener('click', function(e) {
                e.preventDefault();
                contactSubmenu.classList.toggle('open');
                localStorage.setItem('contactOpen', contactSubmenu.classList.contains('open'));
            });
        }

        // Restore states when page loads
        restoreDropdownStates();
    </script>
</body>
</html>
